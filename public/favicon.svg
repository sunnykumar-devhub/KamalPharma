<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <!-- Mask for cutting out the ECG line from the Heart -->
    <mask id="logo-heart-mask">
      <rect x="0" y="0" width="100" height="100" fill="white" />
      <path d="M15 32 H 40 L 43 39 L 48 16 L 53 47 L 57 32 H 85" stroke="black" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    </mask>
    <!-- Mask for cutting out the palm crease from the Hand -->
    <mask id="logo-hand-mask">
      <rect x="0" y="0" width="100" height="100" fill="white" />
      <path d="M 35 73 C 35 78, 42 82, 52 82 C 62 82, 65 77, 65 74" stroke="black" stroke-width="3" stroke-linecap="round" fill="none" />
    </mask>
  </defs>
  <!-- Heart shape -->
  <path d="M50 58 C 45 52, 20 38, 20 25 C 20 15, 28 8, 38 8 C 45 8, 50 12, 50 12 C 50 12, 55 8, 62 8 C 72 8, 80 15, 80 25 C 80 38, 55 52, 50 58 Z" fill="#7A3E9D" mask="url(#logo-heart-mask)" />
  <!-- Hand shape -->
  <path d="M 15 76 C 15 90, 40 94, 60 90 C 75 87, 85 78, 88 64 C 88 59, 82 57, 76 61 C 68 67, 58 70, 50 70 C 42 70, 36 67, 32 70 C 28 73, 20 74, 15 76 Z" fill="#7A3E9D" mask="url(#logo-hand-mask)" />
</svg>
